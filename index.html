<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2e7d52">
<title>🌿 הצמחים שלי</title>
<style>
  :root{
    --green:#2e7d52;
    --green-light:#e7f3ec;
    --green-mid:#56a878;
    --bg:#f4f8f5;
    --card:#ffffff;
    --text:#1f3329;
    --muted:#6b8479;
    --danger:#c0563f;
    --warn:#d99a2b;
    --shadow:0 2px 10px rgba(46,125,82,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Heebo",Arial,sans-serif;
    background:var(--bg);color:var(--text);padding-bottom:24px;
  }
  header{
    background:linear-gradient(135deg,var(--green),var(--green-mid));
    color:#fff;padding:18px 16px 14px;text-align:center;
    position:sticky;top:0;z-index:10;box-shadow:var(--shadow);
  }
  header h1{margin:0;font-size:22px;font-weight:700;}
  header p{margin:4px 0 0;font-size:13px;opacity:.9;}

  .container{max-width:560px;margin:0 auto;padding:14px;}

  /* Plant card */
  .card{
    background:var(--card);border-radius:16px;box-shadow:var(--shadow);
    margin-bottom:14px;overflow:hidden;
  }
  /* square photo, whole image visible (no cropping) */
  .photo-wrap{
    width:100%;aspect-ratio:1/1;background:var(--green-light);
    display:flex;align-items:center;justify-content:center;position:relative;
  }
  .photo-wrap img{width:100%;height:100%;object-fit:contain;display:block;}
  .photo-placeholder{
    width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    font-size:52px;cursor:pointer;flex-direction:column;gap:6px;
  }
  .photo-placeholder small{font-size:13px;color:var(--green);font-weight:600;}
  .change-photo{
    position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.5);
    color:#fff;border:0;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;
    cursor:pointer;font-family:inherit;backdrop-filter:blur(3px);
  }

  .card-body{padding:14px 16px 16px;}
  .card-body h2{margin:0;font-size:19px;}
  .eng{color:var(--muted);font-size:13px;margin:2px 0 10px;font-style:italic;}
  .row{display:flex;gap:8px;margin:8px 0;align-items:flex-start;font-size:14px;line-height:1.5;}
  .badge{
    display:inline-block;background:var(--green-light);color:var(--green);
    padding:4px 10px;border-radius:20px;font-size:13px;font-weight:600;
  }
  .status{
    margin-top:12px;padding:10px 12px;border-radius:12px;font-size:14px;font-weight:600;
  }
  .status.ok{background:#e7f6ec;color:#1f7a44;}
  .status.soon{background:#fdf4e1;color:#a9781a;}
  .status.due{background:#fbe9e4;color:#b0432c;}
  .progress{height:8px;border-radius:8px;background:#eef3f0;overflow:hidden;margin:10px 0 4px;}
  .progress > span{display:block;height:100%;border-radius:8px;transition:width .4s;}

  .btn{
    border:0;border-radius:12px;padding:10px 14px;font-size:14px;font-weight:700;
    cursor:pointer;font-family:inherit;background:var(--green);color:#fff;transition:transform .08s;
  }
  .btn:active{transform:scale(.96);}
  .btn.water{width:100%;margin-top:12px;font-size:15px;padding:13px;}
  .btn.ghost{background:#fff;color:var(--green);border:1.5px solid var(--green-light);}
  .btn.small{padding:7px 12px;font-size:13px;}

  /* history (inside card) */
  .history{margin-top:14px;border-top:1px dashed #e3ece6;padding-top:12px;}
  .history h4{margin:0 0 8px;font-size:13px;color:var(--muted);}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{
    background:var(--green-light);color:var(--green);border-radius:8px;
    padding:5px 9px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;
  }
  .chip button{border:0;background:none;color:var(--danger);font-weight:800;cursor:pointer;font-size:14px;line-height:1;padding:0;}
  .empty{color:var(--muted);font-size:13px;font-style:italic;}
  .add-date{display:flex;gap:8px;margin-top:10px;}
  .add-date input{flex:1;border:1.5px solid #e3ece6;border-radius:10px;padding:9px;font-size:14px;font-family:inherit;}

  .toast{
    position:fixed;bottom:24px;right:50%;transform:translateX(50%);
    background:var(--text);color:#fff;padding:10px 18px;border-radius:20px;
    font-size:14px;font-weight:600;z-index:50;opacity:0;pointer-events:none;
    transition:opacity .25s,transform .25s;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(50%) translateY(-6px);}
</style>
</head>
<body>

<header>
  <h1>🌿 הצמחים שלי</h1>
  <p id="sub">מעקב השקיה וטיפים</p>
</header>

<div class="container">
  <div id="list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- default data ---------- */
const defaultPlants = [
    {id:1,name:"דרצנה דרדו",englishName:"Dracaena Dorado",interval:10,lastWatered:"2026-06-20",light:"☀️ אור חזק לא ישיר",tips:"💧 להשקות עד נגירה ולרוקן את התחתית. רגיש לעודף מים."},
    {id:2,name:"אקבריה (סוקולנט)",englishName:"Echeveria",interval:14,lastWatered:"2026-06-20",light:"☀️ שמש ישירה או אור חזק מאוד",tips:"🌵 העלים אוגרים מים. להשקות רק כשהאדמה יבשה לחלוטין!"},
    {id:3,name:"פירמיאנה קולורטה (קאודקס)",englishName:"Firmiana Colorata",interval:12,lastWatered:"2026-06-20",light:"⛅ אור בהיר וחזק, שמש מתונה",tips:"🪵 הגזע המפותל אוגר מים. להשקות רק כשהאדמה יבשה לגמרי."},
    {id:4,name:"אלוקסיה ריגל שילדס",englishName:"Alocasia Regal Shields",interval:7,lastWatered:"2026-06-20",light:"⛅ אור חזק, ללא שמש ישירה",tips:"💧 אוהב לחות. לשמור על אדמה לחה קלות ולא לתת לה להתייבש לחלוטין."}
];

const STORE_KEY = "myPlants_v1";

/* ---------- state load/save ---------- */
function loadPlants(){
  const raw = localStorage.getItem(STORE_KEY);
  if(!raw){
    const seeded = defaultPlants.map(p => ({...p, photo:null, wateredDates: p.lastWatered ? [p.lastWatered] : []}));
    localStorage.setItem(STORE_KEY, JSON.stringify(seeded));
    return seeded;
  }
  try{
    const parsed = JSON.parse(raw);
    return parsed.map(p => ({photo:null, wateredDates:[], ...p, wateredDates: p.wateredDates || (p.lastWatered ? [p.lastWatered] : [])}));
  }catch(e){ console.error(e); return []; }
}
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(plants)); }

let plants = loadPlants();

/* ---------- date helpers ---------- */
function todayISO(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function daysBetween(aISO,bISO){
  const a=new Date(aISO+"T00:00:00"), b=new Date(bISO+"T00:00:00");
  return Math.round((b-a)/86400000);
}
function lastWateredOf(p){
  if(!p.wateredDates || !p.wateredDates.length) return null;
  return [...p.wateredDates].sort().slice(-1)[0];
}
function formatHe(iso){
  if(!iso) return "—";
  const [y,m,d]=iso.split("-");
  return `${d}/${m}/${y}`;
}
function statusOf(p){
  const last = lastWateredOf(p);
  if(!last) return {cls:"due", text:"לא הושקה עדיין 🚱", daysLeft:-999};
  const elapsed = daysBetween(last, todayISO());
  const left = p.interval - elapsed;
  if(left > 2) return {cls:"ok", text:`✅ עוד ${left} ימים להשקיה`, daysLeft:left, elapsed};
  if(left >= 0) return {cls:"soon", text: left===0 ? "💧 להשקות היום!" : `⏳ עוד ${left} ימים`, daysLeft:left, elapsed};
  return {cls:"due", text:`🚨 באיחור של ${Math.abs(left)} ימים`, daysLeft:left, elapsed};
}

/* ---------- toast ---------- */
let toastTimer;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),1800);
}

/* ---------- render ---------- */
function render(){
  const list=document.getElementById("list");
  list.innerHTML="";

  // sort: plants needing water first (smallest daysLeft first)
  const sorted=[...plants].sort((a,b)=>statusOf(a).daysLeft-statusOf(b).daysLeft);

  const dueCount=plants.filter(p=>statusOf(p).daysLeft<=0).length;
  document.getElementById("sub").textContent =
    dueCount>0 ? `💧 ${dueCount} צמחים צריכים מים` : "✅ כל הצמחים מושקים";

  sorted.forEach(p=>{
    const st=statusOf(p);
    const last=lastWateredOf(p);
    const elapsed = last ? daysBetween(last, todayISO()) : null;
    const pct = elapsed===null ? 0 : Math.max(0,Math.min(100, Math.round((elapsed/p.interval)*100)));
    const barColor = st.cls==='due' ? '#c0563f' : st.cls==='soon' ? '#d99a2b' : '#56a878';
    const dates=[...(p.wateredDates||[])].sort().reverse();
    const chips = dates.length
      ? dates.map(d=>`<span class="chip">${formatHe(d)} <button onclick="removeDate(${p.id},'${d}')">✕</button></span>`).join("")
      : `<span class="empty">עדיין אין השקיות רשומות</span>`;

    const photoHTML = p.photo
      ? `<div class="photo-wrap"><img src="${p.photo}" alt="">
           <button class="change-photo" onclick="pickPhoto(${p.id})">📷 החלפה</button></div>`
      : `<div class="photo-wrap"><div class="photo-placeholder" onclick="pickPhoto(${p.id})">🪴<small>הוספת תמונה</small></div></div>`;

    const card=document.createElement("div");
    card.className="card";
    card.innerHTML = `
      ${photoHTML}
      <div class="card-body">
        <h2>${p.name}</h2>
        <div class="eng">${p.englishName||""}</div>
        <div class="row">☀️ <div><b>אור:</b> ${p.light||"—"}</div></div>
        <div class="row">📝 <div>${p.tips||""}</div></div>
        <div class="row">🔁 <div><b>תדירות:</b> כל <span class="badge">${p.interval} ימים</span></div></div>
        <div class="row">🗓️ <div><b>הושקה לאחרונה:</b> ${formatHe(last)}</div></div>
        <div class="progress"><span style="width:${pct}%;background:${barColor}"></span></div>
        <div class="status ${st.cls}">${st.text}</div>
        <button class="btn water" onclick="waterToday(${p.id})">💧 השקיתי היום</button>
        <div class="history">
          <h4>היסטוריית השקיה (${dates.length})</h4>
          <div class="chips">${chips}</div>
          <div class="add-date">
            <input type="date" id="date-${p.id}" max="${todayISO()}" value="${todayISO()}">
            <button class="btn ghost small" onclick="addCustomDate(${p.id})">+ הוספת תאריך</button>
          </div>
        </div>
      </div>`;
    list.appendChild(card);
  });

  if(!document.getElementById("photoInput")){
    const inp=document.createElement("input");
    inp.type="file"; inp.accept="image/*"; inp.id="photoInput"; inp.style.display="none";
    document.body.appendChild(inp);
  }
}

/* ---------- actions ---------- */
function waterToday(id){
  const p=plants.find(x=>x.id===id);
  const t=todayISO();
  if(p.wateredDates.includes(t)){ toast("כבר רשום שהשקית היום 🙂"); return; }
  p.wateredDates.push(t); p.lastWatered=t;
  save(); render(); toast("💧 נרשמה השקיה להיום!");
}
function addCustomDate(id){
  const p=plants.find(x=>x.id===id);
  const val=document.getElementById("date-"+id).value;
  if(!val) return;
  if(p.wateredDates.includes(val)){ toast("התאריך כבר קיים"); return; }
  p.wateredDates.push(val); p.lastWatered=lastWateredOf(p);
  save(); render(); toast("נוסף ✓");
}
function removeDate(id,d){
  const p=plants.find(x=>x.id===id);
  p.wateredDates=p.wateredDates.filter(x=>x!==d);
  p.lastWatered=lastWateredOf(p);
  save(); render();
}
function pickPhoto(id){
  const inp=document.getElementById("photoInput");
  inp.onchange=()=>{
    const file=inp.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const max=900; let {width,height}=img;
        if(width>max){height=height*max/width;width=max;}
        if(height>max){width=width*max/height;height=max;}
        const canvas=document.createElement("canvas");
        canvas.width=width;canvas.height=height;
        canvas.getContext("2d").drawImage(img,0,0,width,height);
        const p=plants.find(x=>x.id===id);
        try{
          p.photo=canvas.toDataURL("image/jpeg",0.82);
          save(); render(); toast("התמונה נשמרה 📷");
        }catch(err){ toast("התמונה גדולה מדי"); }
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
    inp.value="";
  };
  inp.click();
}

render();
</script>
</body>
</html>
